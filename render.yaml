services:
  - type: web
    name: toj-csv-app
    runtime: node
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/me
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: SESSION_SECRET
        sync: false
      - key: REPORTS_ENABLED
        value: "false"
      - key: BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
    disk:
      name: app-data
      mountPath: /opt/render/project/src/db
      sizeGB: 1
